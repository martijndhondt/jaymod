name: Build Linux

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v2.2.0-etlegacy). Leave blank to only produce artifacts.'
        required: false

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib g++-multilib make m4 python3 zip

      - name: Build full package
        run: make pkg

      - name: Locate artifacts
        id: find_artifacts
        run: |
          SO=build/game/qagame.mp.i386.so
          TAR=$(ls build/jaymod-*.tar.gz)
          echo "so=$SO" >> "$GITHUB_OUTPUT"
          echo "tar=$TAR" >> "$GITHUB_OUTPUT"
          ls -lh "$SO" "$TAR"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: jaymod-linux
          path: |
            ${{ steps.find_artifacts.outputs.so }}
            ${{ steps.find_artifacts.outputs.tar }}

      - name: Upload to GitHub release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading to release: $TAG"
          SO="${{ steps.find_artifacts.outputs.so }}"
          TAR="${{ steps.find_artifacts.outputs.tar }}"
          TARNAME=$(basename "$TAR")
          gh release upload "$TAG" \
            "$SO#qagame.mp.i386.so" \
            "$TAR#$TARNAME" \
            --clobber \
            --repo "${{ github.repository }}"

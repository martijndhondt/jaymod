name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v2.2.0-etlegacy). Leave blank to only produce artifacts.'
        required: false

jobs:
  build-windows:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y make m4 python3 python-is-python3 mingw-w64 zip

      - name: Set up MinGW toolchain layout
        run: |
          # The make system constructs CXX as $(GCC/)bin/g++ and strip as
          # $(GCC/)bin/strip, but Ubuntu's mingw-w64 puts the cross-compiler
          # binaries in /usr/bin/ with an i686-w64-mingw32- prefix.
          # Create a wrapper directory that matches the expected layout.
          mkdir -p /tmp/mingw/bin
          ln -s /usr/bin/i686-w64-mingw32-g++-posix /tmp/mingw/bin/g++
          ln -s /usr/bin/i686-w64-mingw32-strip      /tmp/mingw/bin/strip
          # The lib path $(GCC/)i686-w64-mingw32/lib must resolve correctly.
          ln -s /usr/i686-w64-mingw32 /tmp/mingw/i686-w64-mingw32

      - name: Build full package
        run: |
          make PLATFORM=mingw "GCC/=/tmp/mingw/" pkg

      - name: Locate artifacts
        id: find_artifacts
        run: |
          DLL=build.mingw/game/qagame_mp_x86.dll
          TAR=$(ls build.mingw/jaymod-*.tar.gz)
          echo "dll=$DLL" >> "$GITHUB_OUTPUT"
          echo "tar=$TAR" >> "$GITHUB_OUTPUT"
          ls -lh "$DLL" "$TAR"

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: jaymod-windows
          path: |
            ${{ steps.find_artifacts.outputs.dll }}
            ${{ steps.find_artifacts.outputs.tar }}

      - name: Upload to GitHub release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading to release: $TAG"
          DLL="${{ steps.find_artifacts.outputs.dll }}"
          TAR="${{ steps.find_artifacts.outputs.tar }}"
          TARNAME=$(basename "$TAR")
          gh release upload "$TAG" \
            "$DLL#qagame_mp_x86.dll" \
            "$TAR#$TARNAME" \
            --clobber \
            --repo "${{ github.repository }}"

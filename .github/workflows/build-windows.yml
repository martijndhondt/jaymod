name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload the .dll to (e.g. v2.2.0-etlegacy). Leave blank to only produce an artifact.'
        required: false

jobs:
  build-windows:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y make m4 python3 mingw-w64

      - name: Set up MinGW toolchain layout
        run: |
          # The make system constructs CXX as $(GCC/)bin/g++ and strip as
          # $(GCC/)bin/strip, but Ubuntu's mingw-w64 puts the cross-compiler
          # binaries in /usr/bin/ with an i686-w64-mingw32- prefix.
          # Create a wrapper directory that matches the expected layout.
          mkdir -p /tmp/mingw/bin
          ln -s /usr/bin/i686-w64-mingw32-g++-posix /tmp/mingw/bin/g++
          ln -s /usr/bin/i686-w64-mingw32-strip      /tmp/mingw/bin/strip
          # The lib path $(GCC/)i686-w64-mingw32/lib must resolve correctly.
          ln -s /usr/i686-w64-mingw32 /tmp/mingw/i686-w64-mingw32

      - name: Build
        run: |
          make PLATFORM=mingw "GCC/=/tmp/mingw/"

      - name: Locate game module
        id: find_dll
        run: |
          DLL=build.mingw/game/qagame_mp_x86.dll
          echo "path=$DLL" >> "$GITHUB_OUTPUT"
          ls -lh "$DLL"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: qagame_mp_x86.dll
          path: ${{ steps.find_dll.outputs.path }}

      - name: Upload to GitHub release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading to release: $TAG"
          gh release upload "$TAG" \
            "${{ steps.find_dll.outputs.path }}#qagame_mp_x86.dll" \
            --clobber \
            --repo "${{ github.repository }}"
